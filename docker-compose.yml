services:
  jianji:
    build:
      context: .
      dockerfile: Dockerfile
    image: jianji:latest
    container_name: jianji
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_URL: ${APP_URL:?please set APP_URL}
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/dev.db}
      JWT_SECRET: ${JWT_SECRET:?please set JWT_SECRET to a long random value}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      COOKIE_NAME: ${COOKIE_NAME:-jianji_session}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SETUP_TOKEN: ${SETUP_TOKEN:?please set SETUP_TOKEN}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-replace-with-a-strong-admin-password}
      ADMIN_NAME: ${ADMIN_NAME:-管理员}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_SECURE: ${MAIL_SECURE:-true}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-文档中心 <no-reply@example.com>}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      ALLOW_PUBLIC_REGISTER: ${ALLOW_PUBLIC_REGISTER:-true}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      JIANJI_LATEST_VERSION: ${JIANJI_LATEST_VERSION:-}
      JIANJI_CURRENT_COMMIT: ${JIANJI_CURRENT_COMMIT:-}
      JIANJI_UPDATE_REPO: ${JIANJI_UPDATE_REPO:-https://github.com/staklab/jianji.git}
      JIANJI_UPDATE_BRANCH: ${JIANJI_UPDATE_BRANCH:-main}
      JIANJI_UPDATE_CHECK_URL: ${JIANJI_UPDATE_CHECK_URL:-https://api.github.com/repos/staklab/jianji/commits/main}
      JIANJI_UPDATE_COMMAND: ${JIANJI_UPDATE_COMMAND:-}
    volumes:
      - jianji-data:/app/data
      - jianji-uploads:/app/uploads

volumes:
  jianji-data:
  jianji-uploads:
